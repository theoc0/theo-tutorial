<!DOCTYPE html>
<html lang="zh-hk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中文闖關遊戲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1>中文闖關遊戲</h1>
        <p>50關挑戰｜每關30題｜全對通關</p>
      </div>
    </header>

    <!-- 開始畫面 -->
    <section id="startScreen" class="screen start-screen">
      <div class="card setup-card">
        <h2>開始闖關</h2>

        <div class="form-group">
          <label for="studentName">學生姓名</label>
          <input id="studentName" type="text" placeholder="請輸入姓名" />
        </div>

        <div class="form-group">
          <label for="bankSelect">選擇題庫</label>
          <select id="bankSelect"></select>
        </div>

        <div class="setup-actions">
          <button id="startBtn" class="btn btn-primary">開始闖關</button>
          <button id="resetBtn" class="btn btn-outline">重新開始</button>
        </div>

        <div class="start-panel-grid">
          <div class="card side-card">
            <h3>玩家資訊</h3>
            <div class="stat-list">
              <div class="stat-row"><span>玩家</span><strong id="playerDisplay">-</strong></div>
              <div class="stat-row"><span>目前關卡</span><strong id="levelDisplay">LV 1</strong></div>
              <div class="stat-row"><span>最高分</span><strong id="highestScoreDisplay">0</strong></div>
              <div class="stat-row"><span>最新分數</span><strong id="latestScoreDisplay">0</strong></div>
              <div class="stat-row"><span>已通關數</span><strong id="clearedLevelsDisplay">0</strong></div>
            </div>
          </div>

          <div class="card side-card">
            <h3>前十關成績</h3>
            <div id="leftLevelScores" class="level-score-list"></div>
          </div>
        </div>

        <div class="card map-card">
          <h3>關卡地圖</h3>
          <div id="levelMap" class="level-map"></div>
        </div>
      </div>
    </section>

    <!-- 作答畫面 -->
    <section id="quizScreen" class="screen quiz-screen">
      <aside class="card left-panel">
        <h3>玩家資訊</h3>
        <div class="stat-list">
          <div class="stat-row"><span>玩家</span><strong id="playerDisplay">-</strong></div>
          <div class="stat-row"><span>目前關卡</span><strong id="levelDisplay">LV 1</strong></div>
          <div class="stat-row"><span>最高分</span><strong id="highestScoreDisplay">0</strong></div>
          <div class="stat-row"><span>最新分數</span><strong id="latestScoreDisplay">0</strong></div>
          <div class="stat-row"><span>已通關數</span><strong id="clearedLevelsDisplay">0</strong></div>
        </div>

        <h3 class="mt">前十關成績</h3>
        <div id="leftLevelScores" class="level-score-list"></div>

        <h3 class="mt">關卡地圖</h3>
        <div id="levelMap" class="level-map compact"></div>
      </aside>

      <main class="card quiz-main">
        <div class="quiz-meta">
          <div id="questionCounter" class="meta-chip">第 1 / 30 題</div>
          <div id="progressText" class="meta-chip">已作答 0 / 30</div>
          <div id="timerDisplay" class="meta-chip">00:00</div>
        </div>

        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>

        <div class="question-box">
          <h2 id="questionText">題目將顯示在這裡</h2>
          <div id="optionsWrap" class="options-wrap"></div>
        </div>

        <div class="quiz-actions">
          <button id="prevBtn" class="btn btn-outline">上一題</button>
          <button id="nextBtn" class="btn btn-outline">下一題</button>
          <button id="submitBtn" class="btn btn-primary">交卷</button>
        </div>
      </main>
    </section>

    <!-- 結果畫面 -->
    <section id="resultScreen" class="screen result-screen">
      <div class="card result-card">
        <h2 id="resultTitle">結果</h2>
        <p id="scoreText" class="result-score">得分：0 / 30</p>
        <p id="starText" class="result-stars">☆☆☆☆☆</p>
        <p id="resultMessage" class="result-message">結果訊息</p>

        <div class="result-actions">
          <button id="nextLevelBtn" class="btn btn-primary">挑戰下一關</button>
          <button id="retryLevelBtn" class="btn btn-warning">重闖本關</button>
          <button class="btn btn-outline" onclick="location.reload()">返回首頁</button>
        </div>
      </div>
    </section>
  </div>

  <script src="question-banks.js"></script>
  <script src="app.js"></script>
</body>
</html>
