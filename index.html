<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中文闖關遊戲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1>中文闖關遊戲</h1>
      <div class="top-links">
        <a href="teacher.html" class="btn ghost">教師後台</a>
      </div>
    </header>

    <section class="card">
      <h2>學生資料</h2>
      <div class="grid-3">
        <div>
          <label>姓名</label>
          <input id="studentName" type="text" placeholder="例如：陳大文" />
        </div>
        <div>
          <label>班別</label>
          <input id="className" type="text" placeholder="例如：6A" />
        </div>
        <div>
          <label>學號</label>
          <input id="studentNo" type="text" placeholder="例如：12" />
        </div>
      </div>
    </section>

    <section class="card">
      <h2>選擇題庫</h2>
      <div class="grid-2">
        <div>
          <label>題庫</label>
          <select id="bankSelect"></select>
          <small id="bankStatus" class="muted"></small>
        </div>
        <div class="actions">
          <button id="startBtn" class="btn">開始作答</button>
          <button id="submitBtn" class="btn success" disabled>提交成績</button>
          <button id="resetBtn" class="btn danger">重設</button>
        </div>
      </div>
    </section>

    <section id="quizSection" class="card hidden">
      <div class="quiz-head">
        <div>
          <h2 id="quizTitle">試卷</h2>
          <p id="quizMeta" class="muted"></p>
        </div>
        <div class="timer-box">
          <span>作答時間</span>
          <strong id="timer">00:00</strong>
        </div>
      </div>

      <div id="questionList"></div>
    </section>

    <section id="resultSection" class="card hidden">
      <h2>作答結果</h2>
      <div class="result-grid">
        <div class="result-item"><span>姓名</span><strong id="rName">-</strong></div>
        <div class="result-item"><span>班別</span><strong id="rClass">-</strong></div>
        <div class="result-item"><span>學號</span><strong id="rNo">-</strong></div>
        <div class="result-item"><span>題庫</span><strong id="rPaper">-</strong></div>
        <div class="result-item"><span>分數</span><strong id="rScore">-</strong></div>
        <div class="result-item"><span>時間</span><strong id="rTime">-</strong></div>
      </div>
      <div>
        <h3>錯題</h3>
        <div id="wrongList" class="wrong-list"></div>
      </div>
    </section>
  </div>

  <script src="question-banks.js"></script>
  <script src="app.js"></script>
</body>
</html>
