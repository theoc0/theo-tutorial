<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中文闖關遊戲</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg">
    <div class="app-shell">
      <header class="top-hero">
        <div class="hero-sub">SHAPING INSPIRATION</div>
        <h1>中文闖關遊戲</h1>
        <p>中國語文一題一頁闖關模式</p>
      </header>

      <section class="setup-card">
        <div class="setup-grid">
          <div class="field">
            <label for="studentName">姓名</label>
            <input id="studentName" type="text" placeholder="例如：陳大文" />
          </div>
          <div class="field">
            <label for="className">班別</label>
            <input id="className" type="text" placeholder="例如：6A" />
          </div>
          <div class="field">
            <label for="studentNo">學號</label>
            <input id="studentNo" type="text" placeholder="例如：12" />
          </div>
          <div class="field">
            <label for="bankSelect">題庫</label>
            <select id="bankSelect"></select>
            <div id="bankStatus" class="helper-text"></div>
          </div>
        </div>

        <div class="setup-actions">
          <button id="startBtn" class="btn btn-primary">開始闖關</button>
          <button id="submitBtn" class="btn btn-accent" disabled>提交試卷</button>
          <button id="resetBtn" class="btn btn-outline">重新開始</button>
        </div>
      </section>

      <main class="game-layout">
        <!-- 左側 -->
        <aside class="side-panel left-panel">
          <div class="panel-card">
            <h2>通關記錄</h2>

            <div class="badge-level-box">
              <div class="level-ring">
                <span id="currentLv">LV 0</span>
              </div>
              <div class="level-summary">
                <div class="summary-line">
                  <span>最高分數</span>
                  <strong id="bestScore">0</strong>
                </div>
                <div class="summary-line">
                  <span>最近分數</span>
                  <strong id="lastScore">0</strong>
                </div>
              </div>
            </div>

            <div class="badge-title">過關徽章</div>
            <div id="badgeGrid" class="badge-grid"></div>
          </div>
        </aside>

        <!-- 中間 -->
        <section class="center-panel">
          <div class="quiz-card">
            <div class="quiz-head">
              <div>
                <h2 id="quizTitle">請先開始作答</h2>
                <p id="quizMeta" class="helper-text">選擇題庫後開始</p>
              </div>
            </div>

            <div id="singleQuestionWrap" class="single-question-wrap">
              <div class="empty-state">
                請先填寫學生資料並按「開始闖關」。
              </div>
            </div>

            <div class="nav-row">
              <button id="prevBtn" class="btn btn-outline" disabled>上一題</button>
              <button id="nextBtn" class="btn btn-primary" disabled>下一題</button>
            </div>
          </div>

          <div id="resultSection" class="result-card hidden">
            <div class="result-hero hidden" id="levelUpBox">
              <div class="level-badge">LV UP!</div>
              <div class="level-text" id="levelUpText">恭喜升級！</div>
            </div>

            <h2>本次結果</h2>

            <div class="result-grid">
              <div class="result-item">
                <span>姓名</span>
                <strong id="rName">-</strong>
              </div>
              <div class="result-item">
                <span>班別</span>
                <strong id="rClass">-</strong>
              </div>
              <div class="result-item">
                <span>學號</span>
                <strong id="rNo">-</strong>
              </div>
              <div class="result-item">
                <span>題庫</span>
                <strong id="rPaper">-</strong>
              </div>
              <div class="result-item">
                <span>分數</span>
                <strong id="rScore">-</strong>
              </div>
              <div class="result-item">
                <span>時間</span>
                <strong id="rTime">-</strong>
              </div>
            </div>

            <div class="wrong-area">
              <h3>錯題重溫</h3>
              <div id="wrongList"></div>
            </div>
          </div>
        </section>

        <!-- 右側 -->
        <aside class="side-panel right-panel">
          <div class="panel-card">
            <h2>作答進度</h2>

            <div class="progress-wrap">
              <div class="progress-label">
                <span>本關進度</span>
                <strong id="progressText">0 / 0</strong>
              </div>
              <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
            </div>

            <div class="mini-status">
              <div class="mini-status-item">
                <span>目前題號</span>
                <strong id="currentQNo">0</strong>
              </div>
              <div class="mini-status-item">
                <span>已作答</span>
                <strong id="answeredCount">0</strong>
              </div>
            </div>

            <div class="timer-wrap">
              <span>正計時</span>
              <strong id="timer">00:00</strong>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <script src="question-banks.js"></script>
  <script src="app.js"></script>
</body>
</html>
