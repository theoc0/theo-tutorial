<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教師後台｜中文闖關遊戲</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <h1>教師後台</h1>
      <div class="top-links">
        <a href="index.html" class="btn ghost">返回學生版</a>
      </div>
    </header>

    <section id="loginCard" class="card">
      <h2>登入</h2>
      <div class="grid-2">
        <div>
          <label>教師密碼</label>
          <input id="teacherPassword" type="password" placeholder="輸入教師密碼" />
        </div>
        <div class="actions">
          <button id="loginBtn" class="btn">登入</button>
          <button id="logoutBtn" class="btn ghost">登出</button>
        </div>
      </div>
      <p id="loginMsg" class="muted"></p>
    </section>

    <section id="dashboard" class="hidden">
      <section class="card">
        <h2>篩選</h2>
        <div class="grid-4">
          <div>
            <label>班別</label>
            <input id="filterClass" type="text" placeholder="例如：6A" />
          </div>
          <div>
            <label>姓名</label>
            <input id="filterName" type="text" placeholder="例如：陳大文" />
          </div>
          <div>
            <label>題庫</label>
            <input id="filterPaper" type="text" placeholder="例如：中六DSE範文學生" />
          </div>
          <div class="actions">
            <button id="loadResultsBtn" class="btn">重新載入</button>
            <button id="printBtn" class="btn success">列印 / 另存 PDF</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>統計</h2>
        <div class="result-grid">
          <div class="result-item"><span>提交份數</span><strong id="statCount">0</strong></div>
          <div class="result-item"><span>平均分</span><strong id="statAvg">0</strong></div>
          <div class="result-item"><span>最高分</span><strong id="statMax">0</strong></div>
          <div class="result-item"><span>最低分</span><strong id="statMin">0</strong></div>
        </div>
      </section>

      <section class="card">
        <h2>成績紀錄</h2>
        <div class="table-wrap">
          <table id="resultsTable">
            <thead>
              <tr>
                <th>時間</th>
                <th>姓名</th>
                <th>班別</th>
                <th>學號</th>
                <th>題庫</th>
                <th>分數</th>
                <th>總分</th>
                <th>百分比</th>
                <th>時間(秒)</th>
                <th>錯題</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </section>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
